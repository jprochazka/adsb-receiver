openapi: 3.1.0
info:
  title: The ADS-B Portal API
  description: This API is used to supply data to ADS-B Portal frontends hosted both locally and remotely.
  license:
    name: The MIT License (MIT)
    url: https://raw.githubusercontent.com/jprochazka/adsb-receiver/portal/LICENSE.md
  version: 1.0.0
externalDocs:
  description: The ADS-B Receiver Project
  url: https://github.com/jprochazka/adsb-receiver
servers:
  - url: http://127.0.0.1:5000/api/v1
tags:
  - name: blog
    description: Access and manage blog data
    externalDocs:
      description: Wiki documentation
      url: https://github.com/jprochazka/adsb-receiver/wiki
paths:
  /blog/post:
    post:
      tags:
        - blog
      summary: Create a new blog post data
      description: Use this API end point to post data to be used to create a new blog post
      operationId: updatePetWithForm
      requestBody:
        description: Create a new blog post
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createBlogPostRequest'
        required: true
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /blog/post/{id}:
    delete:
      tags:
        - blog
      summary: Delete an existing blog post
      description: Deletes an existing blog post assigned the specified blog post ID
      operationId: DeleteBlogPost
      parameters:
        - name: id
          in: path
          description: The ID of the blog post to be deleted
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
    get:
      tags:
        - blog
      summary: Get data related to the specified blog post ID
      description: Returns all data related to the blog post assigned the supplied ID
      operationId: GetBlogPost
      parameters:
        - name: id
          in: path
          description: The ID of the blog post for which the data is being requested
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/blogPost'
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
    put:
      tags:
        - blog
      summary: Updates data related to the specified blog post ID
      description: Updates data related to the blog post assigned the supplied ID
      operationId: PutBlogPost
      parameters:
        - name: id
          in: path
          description: The ID of the blog post for which the data is to be updated
          required: true
          schema:
            type: integer
      requestBody:
        description: Create a new blog post
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updateBlogPostRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/blogPost'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /blog/posts:
    get:
      tags:
        - blog
      summary: Get data related to multiple blog posts
      description: Returns data for all blog posts ordered by the date they were created
      operationId: GetBlogPosts
      parameters:
        - name: offset
          in: query
          description: The number of blog posts to be skipped before adding the first item to the result
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          description: Maximum number of blog posts to be returned
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/blogPosts'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /flight/{flight}:
    get:
      tags:
        - flights
      summary: Get data related to the specified flight
      description: Returns all data related to the flight assigned the supplied flight
      operationId: GetFlight
      parameters:
        - name: flight
          in: path
          description: The name of the flight for which the data is being requested
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/flight'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /flight/{flight}/positions:
    get:
      tags:
        - flights
      summary: Get postion data for a flight
      description: Returns recorded positions for the specified flight
      operationId: GetFlightPositions
      parameters:
        - name: flight
          in: path
          description: The name of the flight for which the position data is being requested
          required: true
          schema:
            type: string
        - name: offset
          in: query
          description: The number of blog posts to be skipped before adding the first item to the result
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          description: Maximum number of flights to be returned
          required: false
          schema:
            type: integer
            default: 500
            minimum: 1
            maximum: 1000
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/positions'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /flights:
    get:
      tags:
        - flights
      summary: Get data related to multiple flights
      description: Returns data for all flights ordered by the date they were created
      operationId: GetFlights
      parameters:
        - name: offset
          in: query
          description: The number of blog posts to be skipped before adding the first item to the result
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          description: Maximum number of flights to be returned
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/flights'
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
  /flights/count:
    get:
      tags:
        - flights
      summary: Gets the number of tracked flights
      description: Returns the total number of flights currently being tracked
      operationId: GetFlightsCount
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                properties:
                  flights:
                    type: integer
        '500':
          description: Internal Server Error
components:
  schemas:
    blogPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
          format: date-time
        author:
          type: string
        content:
          type: string
    blogPosts:
        type: object
        properties:
          offset:
            type: integer
          limit:
            type: integer
          blogPosts:
            type: array
            items:
              $ref: '#/components/schemas/blogPost'
    createBlogPostRequest:
      required:
        - title
        - author
        - content
      properties:
        title:
          type: string
        author:
          type: string
        content:
          type: string
    updateBlogPostRequest:
      required:
        - title
        - content
      properties:
        title:
          type: string
        content:
          type: string
    flight:
      type: object
      properties:
        id:
          type: integer
        aircraft:
          type: string
        flight:
          type: string
        fistSeen:
          type: string
          format: date-time
        lastSeen:
          type: string
          format: date-time
    flights:
      type: object
      properties:
        offset:
          type: integer
        limit:
          type: integer
        flights:
          type: array
          items:
            $ref: '#/components/schemas/flight'
    position:
      type: object
      properties:
        id:
          type: integer
        flight:
          type: integer
        aircraft:
          type: integer
        time:
          type: string
          format: date-time
        message:
          type: integer
        squawk:
          type: integer
        latitude:
          type: number
        longitude:
          type: number
        track:
          type: integer
        altitude:
          type: integer
        verticleRate:
          type: integer
        speed:
          type: integer
    positions:
        type: object
        properties:
          offset:
            type: integer
          limit:
            type: integer
          positions:
            type: array
            items:
              $ref: '#/components/schemas/position'
  requestBodies:
    CreateBlogPostRequest:
      description: An object containing data to be used to create a new blog post
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/createBlogPostRequest'
    UpdateBlogPostRequest:
      description: An object containing data to be used to update an existing blog post
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/createBlogPostRequest'
    