openapi: 3.1.0
info:
  title: The ADS-B Portal API
  description: This API is used to supply data to ADS-B Portal frontends hosted both locally and remotely.
  license:
    name: The MIT License (MIT)
    url: https://raw.githubusercontent.com/jprochazka/adsb-receiver/portal/LICENSE.md
  version: 1.0.0
externalDocs:
  description: The ADS-B Receiver Project
  url: https://github.com/jprochazka/adsb-receiver
servers:
  - url: http://127.0.0.1:5000/api/v1
tags:
  - name: blog
    description: Access and manage blog data
    externalDocs:
      description: Wiki documentation
      url: https://github.com/jprochazka/adsb-receiver/wiki
paths:
  /blog/post:
    post:
      tags:
        - blog
      summary: Create a new blog post data
      description: Use this API end point to post data to be used to create a new blog post
      operationId: updatePetWithForm
      requestBody:
        description: Create a new blog post
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlogPostRequest'
        required: true
      responses:
        '201':
          description: Created
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /blog/post/{id}:
    delete:
      tags:
        - blog
      summary: Delete an existing blog post
      description: Deletes an existing blog post assigned the specified blog post ID
      operationId: DeleteBlogPost
      parameters:
        - name: id
          in: path
          description: The ID of the blog post to be deleted
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
    get:
      tags:
        - blog
      summary: Get data related to the specified blog post ID
      description: Returns all data related to the blog post assigned the supplied ID
      operationId: GetBlogPost
      parameters:
        - name: id
          in: path
          description: The ID of the blog post for which the data is being requested
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogPost'
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
    put:
      tags:
        - blog
      summary: Updates data related to the specified blog post ID
      description: Updates data related to the blog post assigned the supplied ID
      operationId: PutBlogPost
      parameters:
        - name: id
          in: path
          description: The ID of the blog post for which the data is to be updated
          required: true
          schema:
            type: integer
      requestBody:
        description: Create a new blog post
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBlogPostRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogPost'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
  /blog/posts:
    get:
      tags:
        - blog
      summary: Get data related to multiple blog posts
      description: Returns data for all blog posts ordered by the date they were created
      operationId: GetBlogPosts
      parameters:
        - name: offset
          in: query
          description: The number of blog posts to be skipped before adding the first item to the result
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          description: The number of blog posts to be returned
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlogPosts'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '500':
          description: Internal Server Error
components:
  schemas:
    BlogPost:
      type: object
      properties:
        blogPostId:
          type: integer
          format: int64
        dateAdded:
          type: string
          format: date-time
        title:
          type: string
        author:
          type: string
        content:
          type: string
    BlogPosts:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        limit:
          type: integer
          format: int64
        blogPostId:
          type: integer
          format: int64
        dateAdded:
          type: string
          format: date-time
        title:
          type: string
        author:
          type: string
        content:
          type: string
    CreateBlogPostRequest:
      required:
        - title
        - author
        - content
      properties:
        title:
          type: string
        author:
          type: string
        content:
          type: string
    UpdateBlogPostRequest:
      required:
        - title
        - content
      properties:
        title:
          type: string
        content:
          type: string
  requestBodies:
    CreateBlogPostRequest:
      description: An object containing data to be used to create a new blog post
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateBlogPostRequest'
    UpdateBlogPostRequest:
      description: An object containing data to be used to update an existing blog post
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateBlogPostRequest'
    